version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: smart_grid_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: smartgrid
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init_tables.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d smartgrid"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-grid-network

  kafka:
    image: apache/kafka:latest
    container_name: smart_grid_kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    networks:
      - smart-grid-network

  jobmanager:
    image: flink:1.17.1-scala_2.12-java11
    container_name: smart_grid_flink_jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        metrics.reporters: prom
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9249
    volumes:
      - ./flink-sql:/opt/flink/usrlib-sql
      - ./flink-jars:/opt/flink/lib
    depends_on:
      - kafka
      - postgres
    networks:
      - smart-grid-network

  taskmanager:
    image: flink:1.17.1-scala_2.12-java11
    container_name: smart_grid_flink_taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        metrics.reporters: prom
        metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
        metrics.reporter.prom.port: 9250
    volumes:
      - ./flink-sql:/opt/flink/usrlib-sql
      - ./flink-jars:/opt/flink/lib
    networks:
      - smart-grid-network

  prometheus:
    image: prom/prometheus:latest
    container_name: smart_grid_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - smart-grid-network

  grafana:
    image: grafana/grafana:latest
    container_name: smart_grid_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - smart-grid-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smart_grid_kafka_ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - smart-grid-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  smart-grid-network:
    driver: bridge
